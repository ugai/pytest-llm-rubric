[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file."
footer = "\n"
body = """
{%- if version %}

## [{{ version | trim_start_matches(pat="v") }}](https://github.com/ugai/pytest-llm-rubric/releases/tag/{{ version }}) — {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## Unreleased
{%- endif -%}
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
  {% if commit.breaking %} (**BREAKING**){% endif %}\
  ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{%- endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

commit_preprocessors = [
    { pattern = '__([^_]+)__', replace = '`__${1}__`' },
]

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^perf", group = "Performance" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^release", skip = true },
]
