repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src/ tests/
        language: system
        pass_filenames: false
        files: '\.py$'
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check src/ tests/
        language: system
        pass_filenames: false
        files: '\.py$'
      - id: ty-check
        name: ty check
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        files: '\.py$'
